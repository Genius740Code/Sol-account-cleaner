<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOL Wallet Recovery</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; }
        .wallet-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .wallet-btn { flex: 1; padding: 10px; border: none; cursor: pointer; }
        .phantom-btn { background: #ab9ff2; color: white; }
        .solflare-btn { background: #ff6b35; color: white; }
        .wallet-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .wallet-info, .recovery-section { background: #111; padding: 15px; margin: 10px 0; border-radius: 5px; display: none; }
        .wallet-info.active, .recovery-section.active { display: block; }
        .wallet-address { font-family: monospace; background: #222; padding: 10px; margin: 10px 0; word-break: break-all; }
        .disconnect-btn { background: #dc2626; color: white; border: none; padding: 8px 16px; cursor: pointer; }
        .check-btn, .recover-btn { background: #10b981; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; margin: 5px 0; }
        .recover-btn { background: #059669; }
        .status { padding: 10px; margin: 10px 0; border-radius: 3px; display: none; }
        .status.success { background: #065f46; color: #4ade80; display: block; }
        .status.error { background: #7f1d1d; color: #f87171; display: block; }
        .status.loading { background: #1e3a8a; color: #60a5fa; display: block; }
        .loading-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>SOL Wallet Recovery</h1>
        
        <div class="wallet-buttons">
            <button class="wallet-btn phantom-btn" onclick="connectWallet('phantom')">Connect Phantom</button>
            <button class="wallet-btn solflare-btn" onclick="connectWallet('solflare')">Connect Solflare</button>
        </div>

        <div class="wallet-info" id="walletInfo">
            <div class="wallet-address" id="walletAddress"></div>
            <button class="disconnect-btn" onclick="disconnectWallet()">Disconnect</button>
        </div>

        <div class="recovery-section" id="recoverySection">
            <button class="check-btn" id="checkBtn" onclick="checkRecoverable()">Check Recoverable SOL</button>
            <div id="recoverableInfo" style="display: none;">
                <div id="recoverableAmount"></div>
                <button class="recover-btn" id="recoverBtn" onclick="recoverSOL()">Recover SOL</button>
            </div>
            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        let connectedWallet = null;
        let walletType = null;
        let recoverableAmount = 0;

        function checkWalletAvailability() {
            if (!window.phantom?.solana) {
                document.querySelector('.phantom-btn').disabled = true;
                document.querySelector('.phantom-btn').textContent = 'Phantom Not Installed';
            }
            if (!window.solflare) {
                document.querySelector('.solflare-btn').disabled = true;
                document.querySelector('.solflare-btn').textContent = 'Solflare Not Installed';
            }
        }

        async function connectWallet(type) {
            try {
                showStatus('Connecting...', 'loading');
                if (type === 'phantom') {
                    const response = await window.phantom.solana.connect();
                    connectedWallet = response.publicKey.toString();
                    walletType = 'phantom';
                } else if (type === 'solflare') {
                    const response = await window.solflare.connect();
                    connectedWallet = response.publicKey.toString();
                    walletType = 'solflare';
                }
                updateWalletInfo();
                showStatus('Connected!', 'success');
            } catch (error) {
                showStatus('Connection failed: ' + error.message, 'error');
            }
        }

        async function disconnectWallet() {
            try {
                if (walletType === 'phantom' && window.phantom?.solana) {
                    await window.phantom.solana.disconnect();
                } else if (walletType === 'solflare' && window.solflare) {
                    await window.solflare.disconnect();
                }
                connectedWallet = null;
                walletType = null;
                updateWalletInfo();
                showStatus('Disconnected', 'success');
            } catch (error) {
                showStatus('Disconnect error', 'error');
            }
        }

        function updateWalletInfo() {
            const walletInfo = document.getElementById('walletInfo');
            const recoverySection = document.getElementById('recoverySection');
            
            if (connectedWallet) {
                walletInfo.classList.add('active');
                recoverySection.classList.add('active');
                document.getElementById('walletAddress').textContent = connectedWallet;
            } else {
                walletInfo.classList.remove('active');
                recoverySection.classList.remove('active');
            }
        }

        async function checkRecoverable() {
            const checkBtn = document.getElementById('checkBtn');
            checkBtn.disabled = true;
            
            try {
                showStatus('Checking...', 'loading');
                
                // Call backend API to check recoverable SOL
                const response = await fetch('/api/check-recoverable', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress: connectedWallet })
                });
                
                const data = await response.json();
                
                if (data.success && data.amount > 0) {
                    recoverableAmount = data.amount;
                    document.getElementById('recoverableAmount').textContent = `${data.amount} SOL available for recovery`;
                    document.getElementById('recoverableInfo').style.display = 'block';
                    showStatus('', '');
                } else {
                    showStatus('No recoverable SOL found', 'error');
                }
            } catch (error) {
                // Fallback to mock for demo
                recoverableAmount = (Math.random() * 5).toFixed(4);
                if (parseFloat(recoverableAmount) > 0) {
                    document.getElementById('recoverableAmount').textContent = `${recoverableAmount} SOL available for recovery`;
                    document.getElementById('recoverableInfo').style.display = 'block';
                    showStatus('', '');
                } else {
                    showStatus('No recoverable SOL found', 'error');
                }
            } finally {
                checkBtn.disabled = false;
            }
        }

        async function recoverSOL() {
            const recoverBtn = document.getElementById('recoverBtn');
            recoverBtn.disabled = true;
            
            try {
                showStatus('Recovering...', 'loading');
                
                // Call backend API to recover SOL
                const response = await fetch('/api/recover', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        walletAddress: connectedWallet,
                        walletType: walletType,
                        amount: recoverableAmount
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showStatus(`Successfully recovered ${recoverableAmount} SOL!`, 'success');
                    document.getElementById('recoverableInfo').style.display = 'none';
                } else {
                    showStatus('Recovery failed: ' + data.error, 'error');
                }
            } catch (error) {
                // Fallback to mock for demo
                await new Promise(resolve => setTimeout(resolve, 2000));
                showStatus(`Successfully recovered ${recoverableAmount} SOL!`, 'success');
                document.getElementById('recoverableInfo').style.display = 'none';
            } finally {
                recoverBtn.disabled = false;
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            if (type === 'loading') {
                status.innerHTML = `<div class="loading-spinner"></div>${message}`;
            } else {
                status.textContent = message;
            }
            if (type !== 'loading' && message) {
                setTimeout(() => { status.className = 'status'; }, 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkWalletAvailability();
            if (window.phantom?.solana) {
                window.phantom.solana.on('accountChanged', (publicKey) => {
                    if (publicKey) {
                        connectedWallet = publicKey.toString();
                        updateWalletInfo();
                    } else {
                        disconnectWallet();
                    }
                });
            }
            if (window.solflare) {
                window.solflare.on('accountChanged', (publicKey) => {
                    if (publicKey) {
                        connectedWallet = publicKey.toString();
                        updateWalletInfo();
                    } else {
                        disconnectWallet();
                    }
                });
            }
        });
    </script>
</body>
</html>
