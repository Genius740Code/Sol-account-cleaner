version: '3.8'

services:
  solana-recover-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: solana-recover-dev
    ports:
      - "8080:8080"
      - "9142:9142" # Jaeger tracing
    environment:
      - RUST_LOG=debug
      - DATABASE_URL=sqlite:///app/data/solana_recover_dev.db
      - RUST_BACKTRACE=1
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    command: cargo run -- --config config/development.toml server
    restart: unless-stopped

  # Development database
  postgres-dev:
    image: postgres:15-alpine
    container_name: solana-recover-postgres-dev
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=solana_recover_dev
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis for development
  redis-dev:
    image: redis:7-alpine
    container_name: solana-recover-redis-dev
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: solana-recover-jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # HTTP collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

volumes:
  cargo_cache:
  target_cache:
  postgres_dev_data:
  redis_dev_data:

networks:
  default:
    name: solana-recover-dev-network
