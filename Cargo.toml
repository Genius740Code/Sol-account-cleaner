[package]
name = "solana_recover"
version = "0.1.0"
edition = "2021"

[dependencies]
solana-sdk = "1.18"
solana-client = "1.18"
solana-account-decoder = "1.18"
spl-token = { version = "4.0", features = ["no-entrypoint"] }

tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
dashmap = "5.5"
uuid = { version = "1.0", features = ["v4", "serde"] }
clap = { version = "4.0", features = ["derive"] }
config = "0.14"
thiserror = "1.0"
rayon = "1.8"
chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"
hex = "0.4"
reqwest = { version = "0.11", features = ["json"] }
axum = "0.7"
tower = "0.4"
tokio-test = "0.4"
# sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite", "chrono", "uuid"], default-features = false, optional = true }
rusqlite = { version = "0.31", features = ["bundled", "chrono", "uuid"] }
toml = "0.8"

# Performance optimization dependencies
moka = { version = "0.12", features = ["future"] } # High-performance caching
parking_lot = "0.12" # Fast mutexes and rwlocks
crossbeam = "0.8" # Concurrent data structures
flume = "0.11" # Fast channels
lru = "0.12" # LRU cache implementation
bytes = "1.5" # Efficient byte operations
prost = "0.12" # Protocol buffers for efficient serialization
tokio-util = { version = "0.7", features = ["codec"] }
futures = "0.3" # Async utilities
smallvec = { version = "1.11", features = ["serde"] } # Small vector optimization
once_cell = "1.19" # Efficient one-time initialization
fastrand = "2.0" # Fast random number generation
