[package]
name = "solana_recover"
version = "0.1.0"
edition = "2021"

[dependencies]
# Solana
solana-sdk         = "1.18"
solana-client      = "1.18"
solana-account-decoder = "1.18"
spl-token          = { version = "4.0", features = ["no-entrypoint"] }

# Async runtime
tokio              = { version = "1.0", features = ["full"] }
tokio-util         = { version = "0.7", features = ["codec"] }
tokio-test         = "0.4"
async-trait        = "0.1"
futures            = "0.3"

# Web / API
axum               = "0.7"
tower              = "0.4"
tower-http         = { version = "0.5", features = ["cors", "trace", "compression-br"] }
reqwest            = { version = "0.11", features = ["json"] }
hyper              = "1.0"

# Serialization
serde              = { version = "1.0", features = ["derive"] }
serde_json         = "1.0"
toml               = "0.8"
bincode            = "1.3"

# Logging / tracing
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
metrics            = "0.21"
metrics-exporter-prometheus = { version = "0.12", features = ["http-listener"] }

# CLI / Config
clap               = { version = "4.0", features = ["derive"] }
config             = "0.14"

# Error handling
anyhow             = "1.0"
thiserror          = "1.0"

# Database
rusqlite           = { version = "0.31", features = ["bundled", "chrono", "uuid"] }
redis              = { version = "0.26", features = ["tokio-comp", "connection-manager"] }

# Security
sha2               = "0.10"
hmac               = "0.12"
rand               = "0.8"
jsonwebtoken       = "9.0"

# Concurrency / performance
rayon              = "1.8"
dashmap            = "5.5"
parking_lot        = "0.12"
crossbeam          = "0.8"
flume              = "0.11"
moka               = { version = "0.12", features = ["future"] }
lru                = "0.12"
smallvec           = { version = "1.11", features = ["serde"] }
lazy_static        = "1.4"

# Rate limiting
governor           = "0.6"

# Utilities
uuid               = { version = "1.0", features = ["v4", "serde"] }
chrono             = { version = "0.4", features = ["serde"] }
hex                = "0.4"
bytes              = "1.5"
once_cell          = "1.19"
fastrand           = "2.0"

# System monitoring (optional)
[target.'cfg(not(target_env = "msvc"))'.dependencies]
sysinfo = "0.30"

[target.'cfg(target_env = "msvc")'.dependencies]
winapi = { version = "0.3", features = ["psapi"] }