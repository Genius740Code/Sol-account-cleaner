[package]
name = "solana-recover"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
license = "MIT"
description = "A high-performance Solana wallet scanner and SOL recovery library"
repository = "https://github.com/your-org/solana-recover"
documentation = "https://docs.rs/solana-recover"
homepage = "https://github.com/your-org/solana-recover"
keywords = ["solana", "blockchain", "wallet", "recovery", "scanner"]
categories = ["cryptography::cryptocurrencies", "api-bindings", "web-programming::http-client"]
readme = "README.md"
rust-version = "1.70"

[features]
default = ["scanner", "client", "clap"]
scanner = ["tokio", "rayon", "dashmap", "moka", "solana-sdk", "solana-client", "solana-account-decoder", "spl-token"]
client = ["tokio", "reqwest", "async-trait", "futures"]
api = ["axum", "tower", "tower-http", "hyper", "serde_json"]
full = ["scanner", "client", "api", "database", "cache", "metrics", "security", "config"]
database = ["rusqlite", "redis", "uuid", "chrono"]
cache = ["moka", "lru"]
metrics = ["dep:metrics", "metrics-exporter-prometheus"]
security = ["sha2", "hmac", "jsonwebtoken", "rand"]
config = ["dep:config", "clap", "toml", "serde_json"]

[dependencies]
# Core Solana dependencies
solana-sdk         = { version = "1.18", optional = true }
solana-client      = { version = "1.18", optional = true }
solana-account-decoder = { version = "1.18", optional = true }
spl-token          = { version = "4.0", features = ["no-entrypoint"], optional = true }

# Async runtime
tokio              = { version = "1.0", features = ["full"], optional = true }
tokio-util         = { version = "0.7", features = ["codec"], optional = true }
tokio-test         = { version = "0.4", optional = true }
async-trait        = { version = "0.1", optional = true }
futures            = { version = "0.3", optional = true }

# Web / API
axum               = { version = "0.7", optional = true }
tower              = { version = "0.4", optional = true }
tower-http         = { version = "0.5", features = ["cors", "trace", "compression-br"], optional = true }
reqwest            = { version = "0.11", features = ["json"], optional = true }
hyper              = { version = "1.0", optional = true }

# Serialization
serde              = { version = "1.0", features = ["derive"] }
serde_json         = { version = "1.0", optional = true }
toml               = { version = "0.8", optional = true }
bincode            = { version = "1.3", optional = true }

# Logging / tracing
tracing            = { version = "0.1", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"], optional = true }
metrics            = { version = "0.21", optional = true }
metrics-exporter-prometheus = { version = "0.12", features = ["http-listener"], optional = true }

# CLI / Config
clap               = { version = "4.0", features = ["derive"], optional = true }
config             = { version = "0.14", optional = true }

# Error handling
anyhow             = { version = "1.0", optional = true }
thiserror          = { version = "1.0" }

# Database
rusqlite           = { version = "0.31", features = ["bundled", "chrono", "uuid"], optional = true }
redis              = { version = "0.26", features = ["tokio-comp", "connection-manager"], optional = true }

# Security
sha2               = { version = "0.10", optional = true }
hmac               = { version = "0.12", optional = true }
rand               = { version = "0.8", optional = true }
jsonwebtoken       = { version = "9.0", optional = true }

# Concurrency / performance
rayon              = { version = "1.8", optional = true }
dashmap            = { version = "5.5", optional = true }
parking_lot        = { version = "0.12", optional = true }
crossbeam          = { version = "0.8", optional = true }
flume              = { version = "0.11", optional = true }
moka               = { version = "0.12", features = ["future"], optional = true }
lru                = { version = "0.12", optional = true }
smallvec           = { version = "1.11", features = ["serde"], optional = true }
lazy_static        = { version = "1.4", optional = true }

# Rate limiting
governor           = { version = "0.6", optional = true }

# Utilities
uuid               = { version = "1.0", features = ["v4", "serde"], optional = true }
chrono             = { version = "0.4", features = ["serde"], optional = true }
hex                = { version = "0.4", optional = true }
bytes              = { version = "1.5", optional = true }
once_cell          = { version = "1.19", optional = true }
fastrand           = { version = "2.0", optional = true }

# System monitoring (optional)
[target.'cfg(not(target_env = "msvc"))'.dependencies]
sysinfo = { version = "0.30", optional = true }

[target.'cfg(target_env = "msvc")'.dependencies]
winapi = { version = "0.3", features = ["psapi"], optional = true }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.8"

# Disable integration tests for now
# [[test]]
# name = "integration"
# path = "tests/integration/mod.rs"

# [[test]]
# name = "unit"
# path = "tests/unit/mod.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]